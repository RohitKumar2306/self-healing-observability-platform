version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5433:5432"
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-service:
    build:
      context: ./services/orders-service
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ordersdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8081:8081"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: inventorydb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      INVENTORY_LATENCY_ENABLED: ${INVENTORY_LATENCY_ENABLED:-true}
      INVENTORY_MAX_LATENCY_MS: ${INVENTORY_MAX_LATENCY_MS:-2000}
      INVENTORY_FAILURE_RATE: ${INVENTORY_FAILURE_RATE:-0.20}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8082:8082"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: payments-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: paymentsdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PAYMENTS_TIMEOUT_ENABLED: ${PAYMENTS_TIMEOUT_ENABLED:-true}
      PAYMENTS_TIMEOUT_MS: ${PAYMENTS_TIMEOUT_MS:-3000}
      PAYMENTS_TIMEOUT_RATE: ${PAYMENTS_TIMEOUT_RATE:-0.30}
      PAYMENTS_FAILURE_RATE: ${PAYMENTS_FAILURE_RATE:-0.15}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8083:8083"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - observability-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - observability-net

networks:
  observability-net:
    driver: bridge

volumes:
  postgres-data:
