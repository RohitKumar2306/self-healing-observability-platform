version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5433:5432"
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-service:
    build:
      context: ./services/orders-service
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ordersdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8081:8081"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: inventorydb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8082:8082"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: payments-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: paymentsdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8083:8083"
    networks:
      - observability-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  observability-net:
    driver: bridge

volumes:
  postgres-data:
