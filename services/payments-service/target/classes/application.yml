server:
  port: 8083

spring:
  application:
    name: payments-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentsdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

payments:
  simulate:
    timeout-enabled: ${PAYMENTS_TIMEOUT_ENABLED:true}
    timeout-ms: ${PAYMENTS_TIMEOUT_MS:3000}
    timeout-rate: ${PAYMENTS_TIMEOUT_RATE:0.30}
    failure-rate: ${PAYMENTS_FAILURE_RATE:0.15}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318}
  traces:
    sampler:
      probability: 1.0
  resource:
    attributes:
      service.name: payments-service

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
