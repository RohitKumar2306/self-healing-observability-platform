server:
  port: 8081

spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ordersdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

orders:
  inventory-service-url: ${INVENTORY_SERVICE_URL:http://inventory-service:8082}
  payments-service-url: ${PAYMENTS_SERVICE_URL:http://payments-service:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
