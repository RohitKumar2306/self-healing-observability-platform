groups:
  - name: service_alerts
    rules:
      - alert: HighErrorRate
        expr: >
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (job)
            /
            sum(rate(http_server_requests_seconds_count[1m])) by (job)
          ) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "5xx error rate is above 5% (current value: {{ $value | humanizePercentage }}) for {{ $labels.job }}"

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[1m])) by (le, job)) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "p95 latency is above 500ms (current value: {{ $value }}s) for {{ $labels.job }}"

      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 30 seconds"
