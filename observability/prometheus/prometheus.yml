global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "orders-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["orders-service:8081"]

  - job_name: "inventory-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["inventory-service:8082"]

  - job_name: "payments-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["payments-service:8083"]
